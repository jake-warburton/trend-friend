services:
  - type: web
    name: signal-eye-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    disk:
      name: signal-eye-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SIGNAL_EYE_DATABASE_PATH
        value: /data/signal_eye.db
      - key: SIGNAL_EYE_CORS_ORIGINS
        value: https://signal-eye-zeta.vercel.app
      - key: SIGNAL_EYE_REDDIT_USER_AGENT
        sync: false
      - key: SIGNAL_EYE_REFRESH_SECRET
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
