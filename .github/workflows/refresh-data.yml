name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/45 * * * *"

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SIGNAL_EYE_DATABASE_URL: ${{ secrets.SIGNAL_EYE_DATABASE_URL }}
      SIGNAL_EYE_ENABLE_POSTGRES_RUNTIME: "true"
      SIGNAL_EYE_WEB_DATA_PATH: web/data
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_API || '' }}
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN || '' }}
      SIGNAL_EYE_REDDIT_USER_AGENT: ${{ secrets.SIGNAL_EYE_REDDIT_USER_AGENT || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${SIGNAL_EYE_DATABASE_URL}" ]; then
            echo "Missing required Actions secret: SIGNAL_EYE_DATABASE_URL"
            exit 1
          fi

      - name: Show runtime revision
        run: |
          git rev-parse HEAD
          python3 - <<'PY'
          from pathlib import Path

          repository_file = Path("app/data/repositories.py")
          for line_number, line in enumerate(repository_file.read_text(encoding="utf-8").splitlines(), start=1):
              if 2650 <= line_number <= 2658:
                  print(f"{line_number}: {line}")
          PY

      - name: Refresh trend data
        run: |
          mkdir -p web/data
          export SIGNAL_EYE_REDDIT_USER_AGENT="${SIGNAL_EYE_REDDIT_USER_AGENT:-signal-eye-github-action/1.0}"
          python3 scripts/check_supabase.py
          python3 scripts/run_ingestion.py
          python3 scripts/export_web_data.py
